name: liturgical_calendar
description: >-
  Pure-Dart, offline liturgical calendar engine for the Korean Catholic Church
  (한국 천주교 전례력). Computes liturgical seasons, colors, celebrations, ranks and
  reading cycles for any Gregorian date, with a data-driven General Roman
  Calendar base plus a Korean proper overlay.
version: 0.1.0
publish_to: none

environment:
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  collection: ^1.19.0
  meta: ^1.15.0

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.6
