services:
  api:
    build:
      context: ../server-app
    env_file:
      - .env
    depends_on:
      - db
    restart: unless-stopped
    ports:
      - "127.0.0.1:${HOST_API_PORT:-8080}:${API_PORT:-8080}"

  backoffice:
    build:
      context: ../backoffice
    env_file:
      - .env
    depends_on:
      - api
      - db
    restart: unless-stopped
    ports:
      - "127.0.0.1:${HOST_BACKOFFICE_PORT:-13000}:${BACKOFFICE_PORT:-3000}"

  db:
    image: postgres:16-alpine
    env_file:
      - .env
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"

volumes:
  postgres-data:
